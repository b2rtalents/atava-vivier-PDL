
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atava CRM — Candidats Prospects</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;height:100vh;display:flex;flex-direction:column}
:root{--blue:#3b82f6;--green:#10b981;--violet:#7c3aed;--amber:#f59e0b;--rose:#f43f5e;--slate:#64748b}

/* LAYOUT */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:280px;min-width:280px;background:#1e293b;display:flex;flex-direction:column;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}#main-content{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* SIDEBAR */
.sidebar-header{padding:16px;border-bottom:1px solid #334155}
.sidebar-header h1{color:#f1f5f9;font-size:15px;font-weight:700;letter-spacing:.5px}
.sidebar-header p{color:#94a3b8;font-size:11px;margin-top:2px}
.search-box{padding:10px 12px;border-bottom:1px solid #334155}
.search-box input{width:100%;background:#334155;border:none;border-radius:8px;padding:8px 10px;color:#f1f5f9;font-size:12px;outline:none}
.search-box input::placeholder{color:#64748b}
.candidate-list{flex:1;overflow-y:auto}
.candidate-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid #1a2744;display:flex;align-items:center;gap:10px;transition:background .15s}
.candidate-item:hover{background:#263354}
.candidate-item.active{background:#2d4a8a}
.prio-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.candidate-info{flex:1;min-width:0}
.candidate-name{color:#f1f5f9;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.candidate-meta{color:#64748b;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.prospect-count{background:#334155;color:#94a3b8;font-size:10px;padding:2px 6px;border-radius:10px;flex-shrink:0}

/* MAIN HEADER */
.main-header{background:#fff;border-bottom:1px solid #e2e8f0;padding:16px 24px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.candidate-title{display:flex;align-items:center;gap:12px}
.prio-bar{width:4px;height:40px;border-radius:4px}
.candidate-fullname{font-size:20px;font-weight:700;color:#0f172a}
.candidate-subtitle{font-size:13px;color:#64748b;margin-top:2px}
.header-meta{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.header-meta span{font-size:12px;color:#64748b}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start}
.btn{padding:8px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-green{background:#10b981;color:#fff}.btn-green:hover{background:#059669}
.btn-violet{background:#7c3aed;color:#fff}.btn-violet:hover{background:#6d28d9}
.btn-blue{background:#3b82f6;color:#fff}.btn-blue:hover{background:#2563eb}
.btn-gray{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}.btn-gray:hover{background:#e2e8f0}
.btn-red{background:#ef4444;color:#fff}.btn-red:hover{background:#dc2626}
.btn-sm{padding:5px 10px;font-size:11px}

/* STATS BAR */
.stats-bar{display:flex;gap:8px;padding:12px 24px;background:#fff;border-bottom:1px solid #f1f5f9;flex-wrap:wrap}
.stat-chip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}

/* TABS */
.tabs{display:flex;padding:0 24px;background:#fff;border-bottom:1px solid #e2e8f0;gap:4px}
.tab{padding:10px 16px;font-size:13px;font-weight:600;color:#94a3b8;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab.active{color:#3b82f6;border-bottom-color:#3b82f6}
.tab:hover{color:#475569}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px 24px;min-height:0}

/* TABLE */
.prospects-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.prospects-table th{background:#f8fafc;padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0}
.prospects-table td{padding:10px 14px;font-size:12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.prospects-table tr:last-child td{border-bottom:none}
.prospects-table tr:hover td{background:#f8fafc}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;display:inline-block}
.b-contact{background:#fef3c7;color:#92400e}.b-contact::before{background:#f59e0b}
.b-sent{background:#dbeafe;color:#1e40af}.b-sent::before{background:#3b82f6}
.b-connected{background:#d1fae5;color:#065f46}.b-connected::before{background:#10b981}
.b-msg{background:#ede9fe;color:#4c1d95}.b-msg::before{background:#7c3aed}
.b-reply{background:#ccfbf1;color:#134e4a}.b-reply::before{background:#14b8a6}
.b-rdv{background:#fce7f3;color:#831843}.b-rdv::before{background:#ec4899}
.b-ss{background:#f1f5f9;color:#64748b}.b-ss::before{background:#94a3b8}

/* FORMS */
.form-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
.form-group label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;color:#1e293b;outline:none;transition:border .15s;background:#fff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#3b82f6}
.form-group textarea{resize:vertical;min-height:80px;font-family:inherit}

/* MSG CARDS */
.msg-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid #e2e8f0}
.msg-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.msg-card-title{font-size:13px;font-weight:700;color:#1e293b}
.msg-text{font-size:12px;color:#475569;line-height:1.7;white-space:pre-wrap;background:#f8fafc;padding:12px;border-radius:8px;border:1px solid #f1f5f9}

/* PROFIL CARD */
.profil-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid #e2e8f0;margin-bottom:16px}
.profil-card h3{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f1f5f9}
.profil-field{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.profil-label{font-size:11px;font-weight:700;color:#64748b;min-width:100px;text-transform:uppercase;padding-top:1px}
.profil-value{font-size:12px;color:#1e293b;flex:1;line-height:1.5}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{font-size:16px;font-weight:700;margin-bottom:4px}
.modal p{font-size:12px;color:#64748b;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;margin-top:16px}

/* CR MODAL */
.cr-pre{font-size:12px;color:#374151;white-space:pre-wrap;line-height:1.7;background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:14px;max-height:280px;overflow-y:auto;font-family:inherit}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:#94a3b8}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty h3{font-size:15px;font-weight:600;color:#64748b;margin-bottom:6px}

/* ADD PROSPECT FORM */
.add-form{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;border:2px dashed #e2e8f0}

/* NOTIFICATION */
.notif{position:fixed;bottom:20px;right:20px;background:#1e293b;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;z-index:200;animation:slideIn .2s ease;box-shadow:0 4px 12px rgba(0,0,0,.2)}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* EXPORT/IMPORT */
.toolbar{display:flex;gap:8px;padding:10px 24px;background:#f8fafc;border-bottom:1px solid #e2e8f0}

/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{width:240px;min-width:240px}
  .main-header{padding:12px 16px}
  .content{padding:12px 16px}
}

.action-icons{display:flex;gap:4px}
.icon-btn{width:28px;height:28px;border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .15s}
.icon-btn:hover{background:#e2e8f0}
.icon-btn.del:hover{background:#fee2e2}

select.statut-select{padding:4px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;background:#fff;cursor:pointer}

/* ── VIVIER VIEWS ── */
.vv-top{background:#1e293b;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #E9B839}
.vv-page{background:#f4f6f9;padding:24px;overflow-y:auto;flex:1}
.vv-ph{display:flex;align-items:center;gap:16px;background:#004876;padding:14px 20px;border-radius:6px;margin-bottom:20px}
.vv-card{background:#fff;border:1px solid #dde3ec;border-radius:6px;overflow:hidden;box-shadow:0 2px 12px rgba(0,72,118,.07);margin-bottom:24px;page-break-inside:avoid;break-inside:avoid}
.vv-ch{background:#004876;padding:20px 26px 16px}
.vv-ref{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#E9B839;margin-bottom:5px}
.vv-title{font-size:1.1rem;font-weight:700;color:#fff;line-height:1.2;margin-bottom:3px}
.vv-dom{font-size:11px;color:rgba(255,255,255,.65)}
.vv-body{padding:18px 26px}
.vv-strip{display:table;width:100%;border-collapse:collapse;border:1px solid #dde3ec;overflow:hidden;margin-bottom:14px}
.vv-si{display:table-cell;background:#f4f6f9;padding:9px 6px;text-align:center;border-right:1px solid #dde3ec;width:20%}
.vv-si:last-child{border-right:none}
.vv-si.hl{background:#fdf6e3}
.vv-sl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:#76777a;margin-bottom:2px}
.vv-sv{font-size:12px;font-weight:700;color:#004876}
.vv-si.hl .vv-sv{color:#7a5200}
.vv-syn{background:#004876;border-left:3px solid #E9B839;padding:12px 16px;margin-bottom:12px}
.vv-syn p{font-size:12px;color:rgba(255,255,255,.9);line-height:1.75;font-style:italic}
.vv-warn{background:#fff8e6;border:1px solid #E9B839;border-radius:4px;padding:9px 13px;font-size:11px;color:#8a5e00;margin-bottom:12px}
.vv-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.vv-tag{background:#e8f1f8;color:#004876;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px}
.vv-foot{display:flex;justify-content:space-between;align-items:center;padding:11px 26px;background:#f4f6f9;border-top:1px solid #dde3ec}
.vv-fr{font-size:10px;color:#76777a}
.vv-cta{background:#E9B839;color:#004876;font-size:11px;font-weight:700;padding:6px 14px;border:none;border-radius:3px;cursor:pointer;margin-right:6px}
.vv-cta2{background:#004876;color:#fff;font-size:11px;font-weight:700;padding:6px 14px;text-decoration:none;border-radius:3px;letter-spacing:.05em;text-transform:uppercase;display:inline-block}
@media print{
  .no-print,.sidebar,.vv-top{display:none!important}
  body{background:white}
  .vv-page{background:white;padding:0}
  .vv-card{box-shadow:none;border:1px solid #ccc;margin-bottom:0;page-break-after:always;break-after:page}
  #main{width:100%!important}
}
</style>
</head>

  if(statut==="Réponse reçue") return "b-reply";
  if(statut==="RDV fixé") return "b-rdv";
  return "b-ss";
}

// ============================================================
// STATE
// ============================================================
let state = {candidates:[], selectedId:null, tab:"prospects", search:"", view:"crm"};

function loadData() {
  try {
    const saved = localStorage.getItem("atava_crm_v2");
    if(saved) {
      var parsed = JSON.parse(saved);
      state.candidates = parsed.map(function(c) {
        if(c.missionTransition===undefined){var s=(c.statut||"")+(c.metier||"");c.missionTransition=/(transition|mission)/i.test(s);}
        c.disponibleCDI = true;
        var _init = INITIAL_DATA.find(function(x){return x.id===c.id;});
        if(_init && !c.onePagerAnon) c.onePagerAnon = _init.onePagerAnon||"";
        if(_init && !c.tagsAnon) c.tagsAnon = _init.tagsAnon||"";
        var init = INITIAL_DATA.find(function(x){return x.id===c.id;});
        if(init) {
          if(!c.requetes || !c.requetes.length) c.requetes = init.requetes;
          if(!c.messages || !Object.keys(c.messages).length) c.messages = init.messages;
        }
        return c;
      });
      // Fusionner les nouveaux candidats présents dans INITIAL_DATA mais absents du localStorage
      var existingIds = state.candidates.map(function(c){return c.id;});
      INITIAL_DATA.forEach(function(init) {
        if(!existingIds.includes(init.id)) {
          var newC = JSON.parse(JSON.stringify(init));
          newC.disponibleCDI = true;
          state.candidates.push(newC);
          console.log("Nouveau candidat ajouté depuis INITIAL_DATA:", init.prenom, init.nom);
        }
      });
      // Trier par priorité
      state.candidates.sort(function(a,b){ return (a.priorite||99)-(b.priorite||99); });
      saveData();
      return;
    }
  } catch(e){ console.error("loadData error:", e); }
  state.candidates = JSON.parse(JSON.stringify(INITIAL_DATA));
  state.candidates.forEach(function(c){c.disponibleCDI=true;});
}

function saveData() {
  try { localStorage.setItem("atava_crm_v2", JSON.stringify(state.candidates)); } catch(e){}
}

function getCandidate(id) { return state.candidates.find(c=>c.id===id); }
function updateCandidate(updated) {
  state.candidates = state.candidates.map(c=>c.id===updated.id?updated:c);
  saveData(); renderAll();
}

function renderAll() {
  renderSidebar();
  if(state.view==="cockpit"){ renderCockpit(); return; }

  if(state.view==="vivier"){ renderVivierView("vivier"); return; }
  if(state.view==="prospection"){ renderProspectionView(); return; }
  if(state.view==="intake"){ renderIntakeView(); return; }
  if(state.selectedId) renderMain();
}

function filteredCandidates() {
  const q = state.search.toLowerCase();
  if(!q) return state.candidates;
  return state.candidates.filter(c=>
    c.nom.toLowerCase().includes(q)||c.prenom.toLowerCase().includes(q)||
    c.metier.toLowerCase().includes(q)||c.zone.toLowerCase().includes(q)
  );
}

function selectCandidate(id) { state.selectedId=id; state.tab="prospects"; state.view="crm"; renderAll(); }
function setView(v) {
  state.view=v;
  ["crm","transition","vivier","cockpit","prospection"].forEach(function(x){
    var el=document.getElementById("btn-"+x);
    if(el) el.style.opacity = (x===v) ? "1" : "0.6";
  });
  renderAll();
}
function setTab(tab) { state.tab=tab; renderTab(); }
function filterCandidates() { state.search=document.getElementById("search-input").value; renderSidebar(); }

function updateStatut(cid, pid, val) {
  const c = getCandidate(cid);
  const p = c.prospects.find(p=>p.id==pid);
  if(p){ p.statut=val; updateCandidate(c); }
  // Don't re-render fully to avoid losing dropdown focus
  saveData();
  renderSidebar();
  // update stats bar only
  const statsEl = document.querySelector(".stats-bar");
  if(statsEl){ const stats=getStats(getCandidate(cid)); statsEl.innerHTML = buildStatsHTML(stats); }
}

function buildStatsHTML(stats) {
  return `<span class="stat-chip" style="background:#f1f5f9;color:#475569">Total : ${stats.total}</span>
    ${stats.enAttente?`<span class="stat-chip" style="background:#dbeafe;color:#1e40af">⏳ ${stats.enAttente} en attente</span>`:""}
    ${stats.connectes?`<span class="stat-chip" style="background:#d1fae5;color:#065f46">✅ ${stats.connectes} connectés</span>`:""}
    ${stats.msgEnvoyes?`<span class="stat-chip" style="background:#ede9fe;color:#4c1d95">📩 ${stats.msgEnvoyes} msgs envoyés</span>`:""}
    ${stats.reponses?`<span class="stat-chip" style="background:#ccfbf1;color:#134e4a">💬 ${stats.reponses} réponses</span>`:""}
    ${stats.rdv?`<span class="stat-chip" style="background:#fce7f3;color:#831843">📅 ${stats.rdv} RDV</span>`:""}`;
}

function getStats(c) {
  return {
    total: c.prospects.length,
    enAttente: c.prospects.filter(p=>p.statut==="Connexion envoyée").length,
    connectes: c.prospects.filter(p=>p.statut==="Connecté").length,
    msgEnvoyes: c.prospects.filter(p=>p.statut==="Message envoyé").length,
    reponses: c.prospects.filter(p=>["Réponse reçue","RDV fixé"].includes(p.statut)).length,
    rdv: c.prospects.filter(p=>p.statut==="RDV fixé").length,
    suiteSans: c.prospects.filter(p=>p.statut.startsWith("Sans suite")).length,
  };
}

function deleteProspect(cid, pid) {
  if(!confirm("Supprimer ce prospect ?")) return;
  const c = getCandidate(cid);
  c.prospects = c.prospects.filter(p=>p.id!=pid);
  updateCandidate(c); renderAll();
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(()=>notify("✓ Copié dans le presse-papier")).catch(()=>{
    // fallback
    const el=document.createElement("textarea");el.value=text;document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);notify("✓ Copié");
  });
}

function notify(msg) {
  const el=document.createElement("div"); el.className="notif"; el.textContent=msg;
  document.getElementById("notif-container").appendChild(el);
  setTimeout(()=>el.remove(),2500);
}

function showCR(cid) {
  const c=getCandidate(cid);
  const stats=getStats(c);
  const nextRelance=new Date(); nextRelance.setDate(nextRelance.getDate()+7);
  const dateRelance=nextRelance.toLocaleDateString("fr-FR",{day:"numeric",month:"long"});
  const lines=[];
  if(stats.enAttente) lines.push(`🔵 ${stats.enAttente} approche${stats.enAttente>1?"s":""} directe${stats.enAttente>1?"s":""} en cours d'acceptation`);
  if(stats.connectes) lines.push(`✅ ${stats.connectes} connexion${stats.connectes>1?"s":""} acceptée${stats.connectes>1?"s":""}`);
  if(stats.msgEnvoyes) lines.push(`📩 ${stats.msgEnvoyes} message${stats.msgEnvoyes>1?"s":""} envoyé${stats.msgEnvoyes>1?"s":""}`);
  if(stats.reponses) lines.push(`💬 ${stats.reponses} réponse${stats.reponses>1?"s":""} reçue${stats.reponses>1?"s":""}`);
  if(stats.rdv) lines.push(`📅 ${stats.rdv} rendez-vous fixé${stats.rdv>1?"s":""}`);
  if(stats.suiteSans) lines.push(`⚪ ${stats.suiteSans} contact${stats.suiteSans>1?"s":""} sans suite pour le moment`);
  lines.push(`🔄 Prochaines relances prévues le ${dateRelance}`);
  const cr=`Bonjour ${c.prenom},\n\nUn point sur les actions menées pour vous depuis notre dernier échange :\n\n${lines.join("\n")}\n\nTotal des démarches engagées à ce jour : ${stats.total} approches ciblées.\n\nJe reviens vers vous dès qu'une réponse concrète émerge. N'hésitez pas à me solliciter si vous avez des questions ou des contacts à me suggérer.\n\nBonne semaine,\n\nBenoît-Raphaël RODRIGUEZ\nBusiness Partner — Atava RH & Technology\n📍 Nantes · Angers · Pays de la Loire\n🌐 atava.fr | ✉️ brrodriguez@atava.fr | 📞 +33 (0)6 99 77 72 63`;
  showModal(`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">

      <h2>📋 Compte-rendu d'activité</h2>
      <p>${c.prenom} ${c.nom} · à envoyer par email</p>
      <div class="cr-pre">${cr}</div>
      <div class="modal-actions">
        <button class="btn btn-green" onclick="copyText(${JSON.stringify(cr)});this.textContent='✓ Copié!'">📋 Copier</button>
        ${c.email&&c.email!=="—"?`<a class="btn btn-blue" href="mailto:${c.email}?subject=Point%20prospection%20—%20Atava%20RH%20%26%20Technology&body=${encodeURIComponent(cr)}" target="_blank">✉️ Ouvrir dans Mail</a>`:""}

    </div>

function exportData() {
  const json=JSON.stringify(state.candidates,null,2);
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=`atava_crm_${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(url); notify("📥 Export réussi");
}

function importData() {
  const input=document.createElement("input"); input.type="file"; input.accept=".json";
  input.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        const data=JSON.parse(ev.target.result);
        if(!Array.isArray(data)) throw new Error("Format invalide");
        if(confirm(`Importer ${data.length} candidats ? Les données actuelles seront remplacées.`)) {
          state.candidates=data; saveData(); renderAll(); notify("📤 Import réussi");
        }
      } catch(err) { alert("Erreur import : "+err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetData() {
  if(confirm("⚠️ Réinitialiser toutes les données ? Cette action est irréversible.")) {
    state.candidates=JSON.parse(JSON.stringify(INITIAL_DATA));
    saveData(); renderAll(); notify("🔄 Données réinitialisées");
  }
}

function _buildCard(c, ref, showPrint) {
  function mob(z) { z=(z||"").toLowerCase(); if(/international|monde/.test(z)) return "Internationale"; if(/france enti|national/.test(z)) return "Nationale"; return "R\u00e9gionale"; }
  function di(s)  { s=(s||"").toLowerCase(); if(/1 mois|sous 1/.test(s)) return "Sous 1 mois"; if(/en poste|3 mois|qualifier/.test(s)) return "Sous 3 mois"; return "Disponible"; }
  function xp(n)  { if(!n) return ""; var m=n.match(/(\d+)\s*ans?\s*(d[\u2019']exp|de\s*terrain)/i); return m ? m[1]+" ans" : ""; }
  function cz(z)  { return (z||"").replace(/^\d+\s*[\u2014-]\s*/,"").split(",")[0].trim(); }
  function fm(c)  { return (c.missionTransition&&c.disponibleCDI) ? "Mission \u00b7 CDI" : c.missionTransition ? "Mission transition" : "CDI"; }
  var tags = (c.tagsAnon||"").split(",").map(function(t){return t.trim();}).filter(Boolean);
  var synth = c.onePagerAnon || "";
  var tagsH = tags.length ? "<div class=\"tags\">"+tags.map(function(t){return "<span class=\"tag\">"+t+"</span>";}).join("")+"</div>" : "";
  var synthH = synth ? "<div class=\"syn\"><p>"+synth+"</p></div>" : "";
  var dtype = (c.missionTransition ? "transition " : "") + (c.disponibleCDI ? "vivier" : "");
  var printH = showPrint ? "<button onclick=\"window.print()\" style=\"background:#E9B839;color:#004876;border:none;font-size:11px;font-weight:700;padding:7px 14px;border-radius:3px;cursor:pointer;margin-right:8px\">&#x1F5A8; Imprimer</button>" : "";
  return "<div class=\"card\" data-type=\""+dtype+"\">"
    +"<div class=\"ch\"><div class=\"c-ref\">R\u00e9f. "+ref+" \u00b7 Atava RH &amp; Technology \u00b7 Profil anonymis\u00e9</div>"
    +"<div class=\"c-title\">"+(c.metier||"\u2014")+"</div>"
    +"<div class=\"c-domain\">"+(c.secteur||"")+"</div></div>"
    +"<div class=\"cb\">"
      +"<div class=\"strip\">"
        +"<div class=\"si hl\"><div class=\"sl\">Exp\u00e9rience</div><div class=\"sv\">"+(xp(c.notes)||"\u2014")+"</div></div>"
        +"<div class=\"si\"><div class=\"sl\">Zone</div><div class=\"sv\">"+(cz(c.zone)||"\u2014")+"</div></div>"
        +"<div class=\"si\"><div class=\"sl\">Mobilit\u00e9</div><div class=\"sv\">"+(c.mobilite||mob(c.zone))+"</div></div>"
        +"<div class=\"si hl\"><div class=\"sl\">Disponibilit\u00e9</div><div class=\"sv\">"+di(c.statut)+"</div></div>"
        +"<div class=\"si\"><div class=\"sl\">Format</div><div class=\"sv\">"+fm(c)+"</div></div>"
      +"</div>"+synthH+tagsH
    +"</div>"
    +"<div class=\"cf\"><span class=\"cf-ref\">R\u00e9f. "+ref+" \u00b7 brrodriguez@atava.fr \u00b7 atava.fr</span>"
    +"<div>"+printH+"<a class=\"cf-cta\" href=\"mailto:brrodriguez@atava.fr?subject=Demande%20profil%20"+encodeURIComponent(ref)+"\">Demander le profil</a></div>"
    +"</div></div>";
}

function _wrapDoc(title, body, extra) {
  var date = new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
  return "<!DOCTYPE html><html lang=\"fr\"><head>"
    +"<meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">"
    +"<title>Atava \u2014 "+title+"</title>"
    +"<link href=\"https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap\" rel=\"stylesheet\">"
    +"<style>"+_CSS+"</style>"
    +"</head><body>"
    +"<nav class=\"nav no-print\"><img src=\""+_LOGO+"\" alt=\"Atava\"><div class=\"nav-div\"></div>"
    +"<div class=\"nav-title\">"+title+"</div>"
    +"<button class=\"nav-btn\" onclick=\"window.print()\">&#x1F5A8; Imprimer / PDF</button></nav>"
    +(extra||"")
    +"<div class=\"profiles\">"+body
    +"<div class=\"closing\"><h3>Un profil vous int\u00e9resse\u00a0?</h3>"
    +"<p>Contactez-nous pour recevoir le CV nominatif et organiser un premier \u00e9change.</p>"
    +"<div class=\"c-info\">"
    +"<div><div class=\"ci-label\">Contact</div><div class=\"ci-val\">Beno\u00eet-Rapha\u00ebl RODRIGUEZ</div></div>"
    +"<div><div class=\"ci-label\">Email</div><div class=\"ci-val\">brrodriguez@atava.fr</div></div>"
    +"<div><div class=\"ci-label\">T\u00e9l</div><div class=\"ci-val\">+33 6 99 77 72 63</div></div>"
    +"<div><div class=\"ci-label\">Site</div><div class=\"ci-val\">atava.fr</div></div>"
    +"</div>"
    +"<div class=\"legal\">Document confidentiel \u00b7 Atava RH &amp; Technology \u00b7 "+date+"</div>"
    +"</div></div></body></html>";
}

function _dl(name, content) {
  var b = new Blob([content],{type:"text/html;charset=utf-8"});
  var u = URL.createObjectURL(b);
  var a = document.createElement("a");
  a.href=u; a.download=name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(u); }, 1000);
}

function generateCatalogue() {
  var all = state.candidates;
  var nT = all.filter(function(c){ return c.missionTransition; }).length;
  var nV = all.filter(function(c){ return c.disponibleCDI; }).length;
  var filterBar = "<div class=\"filter-bar no-print\">"
    +"<button class=\"ftab active\" onclick=\"fc(this,'all')\">Tous <span class=\"cnt\">"+all.length+"</span></button>"
    +"<button class=\"ftab\" onclick=\"fc(this,'transition')\">&#x1F504; Managers Transition <span class=\"cnt\">"+nT+"</span></button>"
    +"<button class=\"ftab\" onclick=\"fc(this,'vivier')\">&#x1F465; Vivier CDI <span class=\"cnt\">"+nV+"</span></button>"
    +"</div>";
  var fcScript = "<scr"+"ipt>function fc(el,t){"
    +"document.querySelectorAll('.ftab').forEach(function(x){x.classList.remove('active');});"
    +"el.classList.add('active');"
    +"document.querySelectorAll('.card').forEach(function(card){"
    +"card.classList.toggle('hidden',t!=='all'&&card.dataset.type.indexOf(t)===-1);"
    +"});}"
    +"<\/scr"+"ipt>";
  var cards = all.map(function(c,i){
    return _buildCard(c, "AT-P"+String(i+1).padStart(3,"0"), false);
  }).join("");
  var doc = _wrapDoc("Profils disponibles \u2014 Atava", cards, filterBar);
  doc = doc.replace("</body>", fcScript+"</body>");
  _dl("atava-catalogue-"+new Date().toISOString().slice(0,10)+".html", doc);
  notify("Catalogue g\u00e9n\u00e9r\u00e9 \u2014 "+all.length+" profils");
}

function generateOnePager(cId) {
  var c = state.candidates.filter(function(x){ return x.id===cId; })[0];
  if(!c){ notify("Profil introuvable"); return; }
  // Build ref for display
  var idx = state.candidates.indexOf(c);
  var ref = "AT-P"+String(idx+1).padStart(3,"0");
  var card = _buildCard(c, ref, true);
  var doc = _wrapDoc((c.metier||"Profil")+" \u2014 "+ref, card, null);
  _dl("atava-onepager-"+ref.toLowerCase()+".html", doc);
  notify("One-pager "+ref+" g\u00e9n\u00e9r\u00e9");
}

function renderProspectionView() {

  var rows = [];
  state.candidates.forEach(function(cand) {
    (cand.prospects||[]).forEach(function(p) {

        prenom: p.prenom,
        nom: p.nom,
        poste: p.poste||'',
        entreprise: p.entreprise||'',
        localisation: p.localisation||'',
        statut: p.statut||'',
        note: p.note||'',
        inLI: inLI,
        liUrl: p.linkedinUrl||''
      });
    });
  });

  var statutColors = {
    'Connecté':           ['#1a4a1a','#4ade80'],
    'Message envoyé':     ['#1a3a4a','#60a5fa'],
    'Connexion envoyée':  ['#2a2a1a','#fbbf24'],
    'À contacter':        ['#2a1a1a','#f87171'],
    'Sans suite — garde coordonnées': ['#1e1e2e','#64748b'],
    'Réponse positive':   ['#1a3a1a','#34d399'],
  };

  function badgeStatut(s) {
    var col = statutColors[s] || ['#1e293b','#94a3b8'];
    return '<span style="background:'+col[0]+';color:'+col[1]+';padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap">'+s+'</span>';
  }

  function badgeLI(inLI) {
    return inLI
      ? '<span style="background:#0a2a1a;color:#4ade80;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700">✅ Connecté</span>'
      : '<span style="background:#2a1a1a;color:#f87171;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700">⚠️ Absent</span>';
  }

  // Stats
  var total = rows.length;
  var connected = rows.filter(function(r){return r.statut==='Connecté';}).length;
  var msgSent = rows.filter(function(r){return r.statut==='Message envoyé';}).length;
  var pending = rows.filter(function(r){return r.statut==='Connexion envoyée';}).length;
  var toContact = rows.filter(function(r){return r.statut==='À contacter';}).length;
  var inLI = rows.filter(function(r){return r.inLI;}).length;

  // Filter state
  var filterStatut = '';
  var filterCand = '';
  var filterLI = '';

  // Unique candidates for filter
  var candList = [];
  state.candidates.forEach(function(c){

  });

      if(filterL === 'yes' && !r.inLI) return false;
      if(filterL === 'no' && r.inLI) return false;

    });

function runMatching(cand) {
  var rules = CANDIDATE_RULES[cand.id];
  if(!rules) return [];
  
  // Also parse mobilite field for extra zone hints
  var extraZones = [];
  if(cand.mobilite) {
    var mob = normStr(cand.mobilite);
    ['france','idf','bretagne','alsace','grand est','grand ouest','international'].forEach(function(z) {
      if(mob.indexOf(z) !== -1) extraZones.push(z);
    });
    // Extract dept numbers from mobilite
    var depts = mob.match(/\b[0-9]{2}\b/g) || [];
    extraZones = extraZones.concat(depts);
  }
  var allZones = rules.zones.concat(extraZones);
  
  // Existing prospect names to avoid duplicates
  var existing = {};
  (cand.prospects||[]).forEach(function(p) {
    existing[normStr(p.prenom+' '+p.nom)] = true;
  });
  
  var matches = [];
  LI_CONNECTIONS.forEach(function(c) {
    var pos = normStr(c.pos);
    var co = normStr(c.co);
    var full = normStr(c.fn+' '+c.ln);
    
    if(!pos) return;
    if(existing[full]) return;
    
    var posteMatch = rules.postes.some(function(kw){ return pos.indexOf(normStr(kw)) !== -1; });
    if(!posteMatch) return;
    
    var secMatch = rules.secteurs.some(function(kw){ var n=normStr(kw); return pos.indexOf(n)!==-1||co.indexOf(n)!==-1; });
    var zoneMatch = allZones.some(function(kw){ var n=normStr(kw); return pos.indexOf(n)!==-1||co.indexOf(n)!==-1; });
    
    if(secMatch || zoneMatch) {
      matches.push({ prenom:c.fn, nom:c.ln, poste:c.pos, entreprise:c.co, linkedinUrl:c.url, score:(secMatch?2:0)+(zoneMatch?2:0) });
    }
  });
  
  matches.sort(function(a,b){ return b.score-a.score; });
  return matches;
}

function addSelectedMatches() {
  var candId = window._matchCandId;
  var matches = window._matchData;
  var cand = getCandidate(candId);
  if(!cand || !matches) return;

  var checked = Array.from(document.querySelectorAll('.match-cb:checked')).map(function(cb){ return parseInt(cb.dataset.idx); });
  if(checked.length === 0) { notify('Sélectionnez au moins un prospect'); return; }

  var nextId = Math.max.apply(null, (cand.prospects||[]).map(function(p){ return p.id||0; }).concat([0])) + 1;
  var added = 0;
  checked.forEach(function(idx) {
    var m = matches[idx];
    if(!m) return;
    cand.prospects = cand.prospects || [];
    cand.prospects.push({ id: nextId++, prenom: m.prenom, nom: m.nom, poste: m.poste, entreprise: m.entreprise, localisation:'', statut:'Connecté', dateContact:'', note:'Import matching LI', linkedinUrl: m.linkedinUrl||'' });
    added++;
  });

  updateCandidate(cand);
  var modal = document.getElementById('matching-modal');
  if(modal) modal.remove();
  notify('✅ '+added+' prospect(s) ajouté(s) !');
}

function renderCockpit() {
  const mc = document.getElementById("main-content");
  const today = new Date();
  today.setHours(0,0,0,0);

  // Collecter toutes les relances dues (dateContact <= aujourd'hui + statut actif)
  const relances = [];
  const pipeline = [];
  const attente = [];

  state.candidates.forEach(function(c) {
    c.prospects.forEach(function(p) {
      if(!p.statut) return;
      const s = p.statut.toLowerCase();
      const isSansSuite = s.includes('sans suite') || s.includes('archivé');
      if(isSansSuite) return;

      // Extraire date de relance depuis les notes
      const relanceMatch = p.note && p.note.match(/[Rr]elance[^:]*:?\s*(\d{2}\/\d{2}\/\d{4})/);
      if(relanceMatch) {
        const parts = relanceMatch[1].split('/');
        const relDate = new Date(parts[2], parts[1]-1, parts[0]);
        relDate.setHours(0,0,0,0);
        const diff = Math.ceil((relDate - today) / 86400000);
        if(diff <= 3) {
          relances.push({cand:c, p:p, date:relanceMatch[1], diff:diff});
        }
      }

      // Messages en attente de réponse
      if(s.includes('message envoyé') || s.includes('invitation envoyée')) {
        attente.push({cand:c, p:p});
      }

      // Pipeline : statuts chauds
      if(s.includes('connecté') && p.dateContact) {
        const parts2 = (p.dateContact||'').split('/');
        if(parts2.length===3) {
          const d = new Date(parts2[2], parts2[1]-1, parts2[0]);
          const dayOld = Math.ceil((today - d) / 86400000);
          if(dayOld <= 5) pipeline.push({cand:c, p:p, age:dayOld});
        }
      }
    });
  });

  // Trier relances par date
  relances.sort((a,b) => a.diff - b.diff);

  // Candidats prioritaires (top 5)
  const topCands = state.candidates.slice(0,5);

  const fmtDiff = (diff) => {
    if(diff < 0) return `<span style="color:#ef4444;font-weight:700">⚠️ Retard ${Math.abs(diff)}j</span>`;
    if(diff === 0) return `<span style="color:#f59e0b;font-weight:700">🔴 Aujourd'hui</span>`;
    if(diff === 1) return `<span style="color:#f59e0b">🟡 Demain</span>`;
    return `<span style="color:#94a3b8">dans ${diff}j</span>`;
  };

  mc.innerHTML = `
<div style="padding:20px;max-width:1100px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

  <!-- HEADER -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">

function importMessagesCSV() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.csv';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        parseMessagesCSV(ev.target.result);
      } catch(err) {
        alert('Erreur import messages : ' + err.message);
      }
    };
    reader.readAsText(file, 'UTF-8');
  };
  input.click();
}

function parseMessagesCSV(raw) {
  // Nettoyer le BOM UTF-8 si présent
  if(raw.charCodeAt(0) === 0xFEFF) raw = raw.slice(1);
  
  var lines = raw.split(/\r?\n/);
  // Chercher la ligne d'en-tête
  var headerIdx = -1;
  for(var i=0;i<Math.min(10,lines.length);i++){
    if(lines[i].toLowerCase().includes('conversationid') || 
       lines[i].toLowerCase().includes('from') ||
       lines[i].toLowerCase().includes('sender')) {
      headerIdx = i; break;
    }
  }
  if(headerIdx === -1) { alert('Format messages.csv non reconnu. Vérifiez que c\'est bien le fichier messages.csv de LinkedIn.'); return; }
  
  var headers = parseCSVLine(lines[headerIdx]).map(h => h.toLowerCase().trim().replace(/[^a-z0-9]/g,''));
  
  // Colonnes LinkedIn messages.csv : ConversationID, ConversationTitle, From, SenderProfileUrl, To, RecipientProfileUrls, Date, Subject, Content, Folder
  var colFrom = findCol(headers, ['from','sender','expediteur']);
  var colTo   = findCol(headers, ['to','recipient','destinataire']);
  var colDate = findCol(headers, ['date','datetime']);
  var colContent = findCol(headers, ['content','body','message','texte']);
  var colFolder = findCol(headers, ['folder','dossier','type']);
  
  // Parser toutes les lignes
  var messages = [];
  for(var i=headerIdx+1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    var cols = parseCSVLine(lines[i]);
    if(cols.length < 3) continue;
    var msg = {
      from: (cols[colFrom]||'').trim(),
      to:   (cols[colTo]||'').trim(),
      date: (cols[colDate]||'').trim(),
      content: (cols[colContent]||'').trim().slice(0,300),
      folder: (cols[colFolder]||'').trim()
    };
    if(msg.from || msg.to) messages.push(msg);
  }
  
  // Identifier les conversations — qui a répondu à B2R ?
  var myNames = ['benoît-raphaël rodriguez','benoit-raphael rodriguez','b2r','brrodriguez'];
  var conversations = {};
  messages.forEach(function(m) {
    var otherPerson = '';
    var fromLower = m.from.toLowerCase();
    var isFromMe = myNames.some(n => fromLower.includes(n));
    if(isFromMe) {
      otherPerson = m.to.split(',')[0].trim();
    } else {
      otherPerson = m.from;
    }
    if(!otherPerson) return;
    var key = normStr(otherPerson);
    if(!conversations[key]) {
      conversations[key] = {name: otherPerson, sent: 0, received: 0, lastDate: '', lastContent: '', hasReply: false};
    }
    if(isFromMe) {
      conversations[key].sent++;
    } else {
      conversations[key].received++;
      conversations[key].hasReply = true;
      if(!conversations[key].lastDate || m.date > conversations[key].lastDate) {
        conversations[key].lastDate = m.date;
        conversations[key].lastContent = m.content;
      }
    }
  });
  
  // Croiser avec les prospects du CRM
  var updates = [];
  var unmatched = [];
  Object.keys(conversations).forEach(function(key) {
    var conv = conversations[key];
    var nameParts = conv.name.split(/\s+/);
    var found = false;
    state.candidates.forEach(function(c) {
      c.prospects.forEach(function(p) {
        var pKey = normStr(p.prenom + ' ' + p.nom);
        var convKey = normStr(conv.name);
        if(pKey === convKey || convKey.includes(pKey) || pKey.includes(convKey)) {
          found = true;
          updates.push({
            cand: c, p: p, conv: conv,
            action: conv.hasReply ? 'Réponse reçue' : 'Message envoyé'
          });
        }
      });
    });
    if(!found && conv.hasReply) {
      unmatched.push(conv);
    }
  });
  
  showMessagesImportModal(updates, unmatched, messages.length, Object.keys(conversations).length);
}

function parseCSVLine(line) {
  var result = [];
  var current = '';
  var inQuotes = false;
  for(var i=0;i<line.length;i++){
    var c = line[i];
    if(c === '"') {
      if(inQuotes && line[i+1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if(c === ',' && !inQuotes) {
      result.push(current); current = '';
    } else {
      current += c;
    }
  }
  result.push(current);
  return result;
}

function findCol(headers, names) {
  for(var i=0;i<headers.length;i++){
    for(var j=0;j<names.length;j++){
      if(headers[i].includes(names[j])) return i;
    }
  }
  return -1;
}

        <button onclick="launchIntakeIA()" id="intake-btn" style="flex:1;padding:14px;background:linear-gradient(135deg,#6d28d9,#7c3aed);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.5px;transition:opacity .2s">
          ✨ ANALYSER AVEC CLAUDE
        </button>
      </div>

      <!-- LOADING -->
      <div id="intake-loading" style="display:none;text-align:center;padding:30px">
        <div style="width:36px;height:36px;border:3px solid #e2e8f0;border-top:3px solid #7c3aed;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px"></div>
        <div style="font-size:13px;color:#64748b">Claude analyse et structure le profil...</div>
      </div>

      <!-- PREVIEW -->
      <div id="intake-preview" style="display:none;margin-top:20px"></div>

    </div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  `;
}

function switchIntakeMode(mode) {
  intakeState.mode = mode;
  intakeState.preview = null;
  intakeState.pdfBase64 = null;
  intakeState.pdfName = null;
  renderIntakeView();
  setTimeout(function(){ document.getElementById("intake-text").focus(); }, 100);
}

function handlePdfDrop(event) {
  event.preventDefault();
  var file = event.dataTransfer.files[0];
  if(file && file.type === "application/pdf") handlePdfFile(file);
  else alert("Veuillez déposer un fichier PDF.");
  var zone = document.getElementById("pdf-drop-zone");
  if(zone){ zone.style.borderColor='#c4b5fd'; zone.style.background='#faf5ff'; }
}

function handlePdfFile(file) {
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var base64 = e.target.result.split(",")[1];
    intakeState.pdfBase64 = base64;
    intakeState.pdfName = file.name;
    var status = document.getElementById("pdf-status");
    if(status) status.innerHTML = '✅ <strong>' + file.name + '</strong> chargé ('
      + Math.round(file.size/1024) + ' Ko)'
      + '<div style="font-size:11px;color:#059669;margin-top:3px">Prêt — cliquez Analyser avec Claude</div>';
    var zone = document.getElementById("pdf-drop-zone");
    if(zone){ zone.style.borderColor='#059669'; zone.style.background='#f0fdf4'; }
  };
  reader.readAsDataURL(file);
}

async function launchIntakeIA() {
  var text = (document.getElementById("intake-text")||{}).value || "";
  var hasPdf = intakeState.mode === "candidat" && intakeState.pdfBase64;

  if(!text.trim() && !hasPdf){ alert("Collez du texte ou uploadez un CV PDF d'abord."); return; }

  var btn = document.getElementById("intake-btn");
  var loading = document.getElementById("intake-loading");
  var preview = document.getElementById("intake-preview");
  btn.style.display = "none";
  loading.style.display = "block";
  preview.style.display = "none";

  var promptInstruction = "";
  var messageContent = [];

  if(intakeState.mode === "candidat") {
    promptInstruction = `Tu es un assistant spécialisé dans le recrutement. Analyse le profil suivant et extrait les informations pour créer une fiche candidat structurée.

Réponds UNIQUEMENT avec un objet JSON valide (pas de markdown, pas de backticks, juste le JSON brut) avec cette structure exacte :
{
  "nom": "NOM EN MAJUSCULES",
  "prenom": "Prénom",
  "tel": "numéro ou —",
  "email": "email ou —",
  "zone": "Ville / Département / Région",
  "metier": "Intitulé de poste principal",
  "secteur": "Secteur(s) d'activité",
  "statut": "Actif — En recherche",
  "notes": "Résumé synthétique des points clés du profil en 2-3 phrases percutantes",
  "onePagerAnon": "Description anonyme du profil pour prospection, 3-4 phrases",
  "tagsAnon": "Tag1, Tag2, Tag3, Tag4, Tag5 (mots-clés recrutement)",
  "mobilite": "Zone géographique — CDI ou mission",
  "missionTransition": false,
  "disponibleCDI": true
}`;

    if(hasPdf) {
      messageContent = [{
        role: "user",
        content: [
          { type: "document", source: { type: "base64", media_type: "application/pdf", data: intakeState.pdfBase64 } },
          { type: "text", text: promptInstruction }
        ]
      }];
    } else {
      messageContent = [{ role: "user", content: promptInstruction + "\n\nTexte source :\n\"\"\"\n" + text + "\n\"\"\"" }];
    }
  } else {
    var selEl = document.getElementById("intake-candidate-select");
    intakeState.prospectCandidateId = selEl ? selEl.value : null;
    var promptProspect = `Tu es un assistant spécialisé dans le recrutement. Analyse le texte suivant qui contient un ou plusieurs prospects (décideurs à contacter pour placer un candidat).

Texte source :
"""
${text}
"""

Réponds UNIQUEMENT avec un tableau JSON valide (pas de markdown, pas de backticks, juste le JSON brut) contenant les prospects extraits :
[
  {
    "prenom": "Prénom",
    "nom": "NOM",
    "poste": "Titre du poste",
    "entreprise": "Nom entreprise",
    "localisation": "Ville, Région",
    "statut": "À contacter",
    "dateContact": "",
    "note": "",
    "linkedinUrl": "URL LinkedIn si présente sinon vide"
  }
]`;
    messageContent = [{ role: "user", content: promptProspect }];
  }

  try {
    var response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        messages: messageContent
      })
    });
    var data = await response.json();
    var rawText = (data.content && data.content[0] && data.content[0].text) || "";
    rawText = rawText.replace(/```json|```/g, "").trim();
    var parsed = JSON.parse(rawText);

    loading.style.display = "none";
    btn.style.display = "block";
    preview.style.display = "block";
    intakeState.preview = parsed;

    if(intakeState.mode === "candidat") {
      renderCandidatPreview(parsed);
    } else {
      renderProspectsPreview(parsed);
    }
  } catch(e) {
    loading.style.display = "none";
    btn.style.display = "block";
    preview.innerHTML = '<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:16px;color:#991b1b;font-size:13px">❌ Erreur : ' + e.message + '<br><small>Vérifiez que le texte est lisible et réessayez.</small></div>';
    preview.style.display = "block";
  }
}

function renderCandidatPreview(c) {
  var preview = document.getElementById("intake-preview");
  preview.innerHTML = `
  <div style="background:#fff;border:2px solid #7c3aed;border-radius:12px;overflow:hidden">
    <div style="background:#f5f3ff;padding:14px 18px;border-bottom:1px solid #e9d5ff;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:14px;font-weight:800;color:#4c1d95">✅ Profil structuré — vérifiez avant d'ajouter</div>
    </div>
    <div style="padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
      ${fieldPreview("Nom", c.nom, "intake-f-nom")}
      ${fieldPreview("Prénom", c.prenom, "intake-f-prenom")}
      ${fieldPreview("Téléphone", c.tel, "intake-f-tel")}
      ${fieldPreview("Email", c.email, "intake-f-email")}
      ${fieldPreview("Zone", c.zone, "intake-f-zone")}
      ${fieldPreview("Métier", c.metier, "intake-f-metier")}
      ${fieldPreview("Secteur", c.secteur, "intake-f-secteur")}
      ${fieldPreview("Mobilité", c.mobilite, "intake-f-mobilite")}
    </div>
    <div style="padding:0 18px 12px">
      ${fieldPreviewFull("Notes", c.notes, "intake-f-notes")}
      ${fieldPreviewFull("One-Pager Anonyme", c.onePagerAnon, "intake-f-onepager")}
      ${fieldPreviewFull("Tags", c.tagsAnon, "intake-f-tags")}
    </div>
    <div style="padding:14px 18px;border-top:1px solid #f1f5f9;display:flex;gap:10px">
      <button onclick="confirmAddCandidat()" style="flex:1;padding:12px;background:#166534;color:#4ade80;border:1px solid #4ade80;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer">✅ AJOUTER AU CRM</button>
      <button onclick="document.getElementById('intake-preview').style.display='none'" style="flex:1;padding:12px;background:#f1f5f9;color:#64748b;border:none;border-radius:8px;font-size:13px;cursor:pointer">✏️ Modifier le texte</button>
    </div>
  </div>`;
}

function fieldPreview(label, val, id) {
  return '<div><div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px">'+label+'</div>'
    +'<input id="'+id+'" value="'+escapeAttr(val||'')+'" style="width:100%;padding:7px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;color:#1e293b;box-sizing:border-box"/></div>';
}
function fieldPreviewFull(label, val, id) {
  return '<div style="margin-bottom:10px"><div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px">'+label+'</div>'
    +'<textarea id="'+id+'" style="width:100%;padding:7px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;color:#1e293b;resize:vertical;min-height:60px;box-sizing:border-box;font-family:inherit">'+escapeHtml(val||'')+'</textarea></div>';
}
function escapeAttr(s){ return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function confirmAddCandidat() {
  var c = intakeState.preview;
  if(!c) return;
  // Lire les champs éditables
  function gv(id){ var el=document.getElementById(id); return el?el.value:''; }
  var nom = gv("intake-f-nom").toUpperCase() || c.nom;
  var prenom = gv("intake-f-prenom") || c.prenom;
  var id = (prenom.toLowerCase().replace(/[^a-z]/g,'') + '_' + nom.toLowerCase().replace(/[^a-z]/g,'') + '_' + Date.now()).slice(0,30);
  var newCandidat = Object.assign({}, c, {
    id: id,
    nom: nom,
    prenom: gv("intake-f-prenom") || c.prenom,
    tel: gv("intake-f-tel") || c.tel,
    email: gv("intake-f-email") || c.email,
    zone: gv("intake-f-zone") || c.zone,
    metier: gv("intake-f-metier") || c.metier,
    secteur: gv("intake-f-secteur") || c.secteur,
    mobilite: gv("intake-f-mobilite") || c.mobilite,
    notes: gv("intake-f-notes") || c.notes,
    onePagerAnon: gv("intake-f-onepager") || c.onePagerAnon,
    tagsAnon: gv("intake-f-tags") || c.tagsAnon,
    priorite: state.candidates.length + 1,
    prospects: [],
    messages: {},
    requetes: [],
    disponibleCDI: true,
    missionTransition: c.missionTransition || false
  });
  state.candidates.push(newCandidat);
  saveData();
  notify("✅ " + newCandidat.prenom + " " + newCandidat.nom + " ajouté au CRM !");
  intakeState.preview = null;
  document.getElementById("intake-text").value = "";
  document.getElementById("intake-preview").style.display = "none";
  // Sélectionner le nouveau candidat
  state.selectedId = newCandidat.id;
  setView('crm');
}

function renderProspectsPreview(prospects) {
  if(!Array.isArray(prospects)) prospects = [prospects];
  var preview = document.getElementById("intake-preview");
  var rows = prospects.map(function(p, i){
    return '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:8px">'
      +'<div style="display:flex;gap:10px;flex-wrap:wrap">'
      +'<input placeholder="Prénom" id="ip-prenom-'+i+'" value="'+escapeAttr(p.prenom||'')+'" style="flex:1;min-width:100px;padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px">'
      +'<input placeholder="NOM" id="ip-nom-'+i+'" value="'+escapeAttr(p.nom||'')+'" style="flex:1;min-width:100px;padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px">'
      +'<input placeholder="Poste" id="ip-poste-'+i+'" value="'+escapeAttr(p.poste||'')+'" style="flex:2;min-width:160px;padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px">'
      +'<input placeholder="Entreprise" id="ip-ent-'+i+'" value="'+escapeAttr(p.entreprise||'')+'" style="flex:2;min-width:160px;padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px">'
      +'<input placeholder="Localisation" id="ip-loc-'+i+'" value="'+escapeAttr(p.localisation||'')+'" style="flex:1;min-width:100px;padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px">'
      +'<input placeholder="URL LinkedIn" id="ip-url-'+i+'" value="'+escapeAttr(p.linkedinUrl||'')+'" style="flex:3;min-width:180px;padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px">'
      +'</div></div>';
  }).join('');

  var cand = state.candidates.find(function(c){ return c.id === intakeState.prospectCandidateId; });
  var candName = cand ? cand.prenom + ' ' + cand.nom : '?';

  preview.innerHTML = `
  <div style="background:#fff;border:2px solid #7c3aed;border-radius:12px;overflow:hidden">
    <div style="background:#f5f3ff;padding:14px 18px;border-bottom:1px solid #e9d5ff;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:14px;font-weight:800;color:#4c1d95">✅ ${prospects.length} prospect(s) structuré(s) pour ${candName}</div>
    </div>
    <div style="padding:18px">${rows}</div>
    <div style="padding:14px 18px;border-top:1px solid #f1f5f9;display:flex;gap:10px">
      <button onclick="confirmAddProspects(${prospects.length})" style="flex:1;padding:12px;background:#166534;color:#4ade80;border:1px solid #4ade80;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer">✅ AJOUTER AU CRM (${prospects.length})</button>
      <button onclick="document.getElementById('intake-preview').style.display='none'" style="flex:1;padding:12px;background:#f1f5f9;color:#64748b;border:none;border-radius:8px;font-size:13px;cursor:pointer">✏️ Modifier</button>
    </div>
  </div>`;
}

function confirmAddProspects(count) {
  var cand = state.candidates.find(function(c){ return c.id === intakeState.prospectCandidateId; });
  if(!cand){ alert("Candidat introuvable."); return; }
  var maxId = (cand.prospects||[]).reduce(function(m,p){ return Math.max(m, p.id||0); }, 0);
  for(var i=0; i<count; i++){
    function gv(id){ var el=document.getElementById(id); return el?el.value.trim():''; }
    var prenom = gv("ip-prenom-"+i);
    var nom = gv("ip-nom-"+i);
    if(!prenom && !nom) continue;
    maxId++;
    cand.prospects.push({
      id: maxId,
      prenom: prenom,
      nom: nom.toUpperCase(),
      poste: gv("ip-poste-"+i),
      entreprise: gv("ip-ent-"+i),
      localisation: gv("ip-loc-"+i),
      statut: "À contacter",
      dateContact: new Date().toLocaleDateString("fr-FR"),
      note: "🤖 Import IA",
      linkedinUrl: gv("ip-url-"+i)
    });
  }
  updateCandidate(cand);
  notify("✅ " + count + " prospect(s) ajouté(s) à " + cand.prenom + " " + cand.nom);
  intakeState.preview = null;
  document.getElementById("intake-text").value = "";
  document.getElementById("intake-preview").style.display = "none";
  state.selectedId = cand.id;
  setView('crm');
}

function applyMessagesImport() {
  var applied = 0;
  (window._msgUpdates||[]).forEach(function(u, i) {
    var cb = document.getElementById('msg-cb-'+i);
    if(cb && !cb.checked) return;
    var p = u.p;
    if(u.conv.hasReply && !p.statut.includes('Réponse')) {
      p.statut = 'Réponse reçue';
      p.note = (p.note||'') + ' | 📨 Réponse détectée via messages.csv (' + u.conv.received + ' msg reçu(s))';
      applied++;
    }
  });
  saveData();
  var modal = document.getElementById('msg-import-modal');
  if(modal) modal.remove();
  notify('✅ ' + applied + ' prospect(s) mis à jour depuis messages.csv');
  renderAll();
}

</script>
